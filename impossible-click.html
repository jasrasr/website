<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impossible Click</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background: radial-gradient(ellipse at center, #0d1b2a 0%, #050a10 100%);
            font-family: 'Segoe UI', sans-serif;
            cursor: crosshair;
            user-select: none;
        }

        #title {
            position: fixed;
            top: 24px;
            width: 100%;
            text-align: center;
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 100, 100, 0.8);
            pointer-events: none;
        }

        #subtitle {
            position: fixed;
            top: 62px;
            width: 100%;
            text-align: center;
            color: #aaaaaa;
            font-size: 14px;
            letter-spacing: 1px;
            pointer-events: none;
        }

        #target {
            position: absolute;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ff8c69, #c0392b);
            box-shadow:
                0 0 20px rgba(255, 80, 80, 0.6),
                0 0 60px rgba(255, 80, 80, 0.2),
                inset 0 2px 6px rgba(255,255,255,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 52px;
            cursor: pointer;
            transition: left 0.05s linear, top 0.05s linear, box-shadow 0.1s;
            will-change: left, top;
        }

        #target:active {
            transform: scale(0.95);
        }

        #target.fleeing {
            box-shadow:
                0 0 30px rgba(255, 200, 0, 0.8),
                0 0 80px rgba(255, 200, 0, 0.3),
                inset 0 2px 6px rgba(255,255,255,0.3);
        }

        #scoreboard {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 32px;
            pointer-events: none;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            color: #888;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .score-value {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
        }

        #score-caught .score-value { color: #2ecc71; }
        #score-misses .score-value { color: #e74c3c; }

        #toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(46, 204, 113, 0.15);
            border: 2px solid #2ecc71;
            color: #2ecc71;
            padding: 16px 40px;
            border-radius: 12px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            pointer-events: none;
            transition: transform 0.15s ease, opacity 0.3s ease;
            opacity: 0;
        }

        #toast.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        /* trail particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: fade-out 0.5s ease forwards;
        }

        @keyframes fade-out {
            0%   { opacity: 0.7; transform: scale(1); }
            100% { opacity: 0;   transform: scale(0.2); }
        }
    </style>
</head>
<body>

    <div id="title">😈 CATCH ME IF YOU CAN</div>
    <div id="subtitle">Click the button — it moves away from your cursor</div>

    <div id="target">😈</div>

    <div id="scoreboard">
        <div class="score-item" id="score-caught">
            <div class="score-label">Caught</div>
            <div class="score-value" id="val-caught">0</div>
        </div>
        <div class="score-item" id="score-misses">
            <div class="score-label">Misses</div>
            <div class="score-value" id="val-misses">0</div>
        </div>
        <div class="score-item">
            <div class="score-label">Accuracy</div>
            <div class="score-value" id="val-accuracy">—</div>
        </div>
    </div>

    <div id="toast">GOT IT! 🎉</div>

    <script>
        const target      = document.getElementById('target');
        const valCaught   = document.getElementById('val-caught');
        const valMisses   = document.getElementById('val-misses');
        const valAccuracy = document.getElementById('val-accuracy');
        const toast       = document.getElementById('toast');

        const SIZE          = 130;
        const HALF          = SIZE / 2;
        const FLEE_RADIUS   = 180;  // distance to start fleeing
        const FLEE_POWER    = 2.5;  // flee strength
        const WALL_MARGIN   = 160;  // distance from edge that triggers wall push
        const WALL_POWER    = 4.0;  // wall repulsion strength
        const PREDICT_MS    = 80;   // ms ahead to predict mouse position
        const CORNER_RADIUS = 130;  // distance from corner that triggers teleport

        let tx = window.innerWidth  / 2;
        let ty = window.innerHeight / 2;
        let caught = 0;
        let misses = 0;
        let toastTimer = null;

        // Mouse tracking with velocity
        let mx = -999, my = -999;
        let prevMx = -999, prevMy = -999;
        let mvx = 0, mvy = 0;
        let lastMoveTime = 0;

        function clamp(val, lo, hi) { return Math.max(lo, Math.min(hi, val)); }

        function place() {
            target.style.left = (tx - HALF) + 'px';
            target.style.top  = (ty - HALF) + 'px';
        }

        place();

        function spawnParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = 10 + Math.random() * 16;
            p.style.cssText = `
                width:${size}px; height:${size}px;
                left:${tx - size/2}px; top:${ty - size/2}px;
                background: rgba(255,${80 + Math.random()*120|0},60,0.5);
            `;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 500);
        }

        function teleportToSafety() {
            // Divide screen into quadrants, pick the one farthest from the mouse
            const W   = window.innerWidth;
            const H   = window.innerHeight;
            const cx  = W / 2;
            const cy  = H / 2;
            const pad = HALF + 80;

            const quadrants = [
                { x: pad + Math.random() * (cx - pad * 1.5),           y: pad + Math.random() * (cy - pad * 1.5) },
                { x: cx + Math.random() * (W - cx - pad * 1.5),        y: pad + Math.random() * (cy - pad * 1.5) },
                { x: pad + Math.random() * (cx - pad * 1.5),           y: cy + Math.random() * (H - cy - pad * 1.5) },
                { x: cx + Math.random() * (W - cx - pad * 1.5),        y: cy + Math.random() * (H - cy - pad * 1.5) },
            ];

            let best = quadrants[0], bestDist = 0;
            for (const q of quadrants) {
                const d = Math.hypot(q.x - mx, q.y - my);
                if (d > bestDist) { bestDist = d; best = q; }
            }

            tx = clamp(best.x, HALF + 4, W - HALF - 4);
            ty = clamp(best.y, HALF + 4, H - HALF - 4);
            place();
        }

        document.addEventListener('mousemove', e => {
            const now = performance.now();
            const dt  = Math.max(now - lastMoveTime, 1);
            prevMx = mx; prevMy = my;
            mx = e.clientX;
            my = e.clientY;

            // Smooth velocity (pixels per frame at 60fps)
            mvx = (mx - prevMx) / dt * 16;
            mvy = (my - prevMy) / dt * 16;
            lastMoveTime = now;

            // Predict where the mouse will be PREDICT_MS from now
            const pmx = mx + mvx * (PREDICT_MS / 16);
            const pmy = my + mvy * (PREDICT_MS / 16);

            const dx   = pmx - tx;
            const dy   = pmy - ty;
            const dist = Math.hypot(dx, dy);

            let moved = false;

            // --- Flee from (predicted) mouse ---
            if (dist < FLEE_RADIUS && dist > 0) {
                const strength = ((FLEE_RADIUS - dist) / FLEE_RADIUS) * FLEE_POWER;
                const angle    = Math.atan2(dy, dx);
                tx -= Math.cos(angle) * strength * (FLEE_RADIUS - dist) * 0.38;
                ty -= Math.sin(angle) * strength * (FLEE_RADIUS - dist) * 0.38;
                target.classList.add('fleeing');
                moved = true;
            } else {
                target.classList.remove('fleeing');
            }

            // --- Wall repulsion: push away from all four edges ---
            const W = window.innerWidth;
            const H = window.innerHeight;

            if (tx < WALL_MARGIN)     tx += Math.pow((WALL_MARGIN - tx) / WALL_MARGIN, 1.5) * WALL_POWER * 5;
            if (tx > W - WALL_MARGIN) tx -= Math.pow((tx - (W - WALL_MARGIN)) / WALL_MARGIN, 1.5) * WALL_POWER * 5;
            if (ty < WALL_MARGIN)     ty += Math.pow((WALL_MARGIN - ty) / WALL_MARGIN, 1.5) * WALL_POWER * 5;
            if (ty > H - WALL_MARGIN) ty -= Math.pow((ty - (H - WALL_MARGIN)) / WALL_MARGIN, 1.5) * WALL_POWER * 5;

            // Hard clamp
            const pad = HALF + 4;
            tx = clamp(tx, pad, W - pad);
            ty = clamp(ty, pad, H - pad);

            // --- Corner escape: if pinned in a corner with mouse nearby, teleport ---
            const inCornerX = tx < CORNER_RADIUS || tx > W - CORNER_RADIUS;
            const inCornerY = ty < CORNER_RADIUS || ty > H - CORNER_RADIUS;
            if (inCornerX && inCornerY && dist < FLEE_RADIUS * 1.3) {
                teleportToSafety();
                return;
            }

            if (moved) spawnParticle();
            place();
        });

        // Missed click
        document.addEventListener('click', () => {
            misses++;
            updateScore();
        });

        // Successful catch
        target.addEventListener('click', e => {
            e.stopPropagation();
            caught++;
            updateScore();
            showToast();
            setTimeout(teleportToSafety, 300);
        });

        function updateScore() {
            valCaught.textContent   = caught;
            valMisses.textContent   = misses;
            const total = caught + misses;
            valAccuracy.textContent = total > 0
                ? Math.round(caught / total * 100) + '%'
                : '—';
        }

        function showToast() {
            clearTimeout(toastTimer);
            toast.classList.add('show');
            toastTimer = setTimeout(() => toast.classList.remove('show'), 1200);
        }

        window.addEventListener('resize', () => {
            const pad = HALF + 4;
            tx = clamp(tx, pad, window.innerWidth  - pad);
            ty = clamp(ty, pad, window.innerHeight - pad);
            place();
        });
    </script>
</body>
</html>
